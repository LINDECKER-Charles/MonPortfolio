<div class="image-lightbox" (click)="close.emit()">
  <div
    class="image-lightbox__dialog"
    role="dialog"
    aria-modal="true"
    aria-label="Apercu plein ecran"
    (click)="$event.stopPropagation()">
    <button
      type="button"
      class="image-lightbox__close"
      (click)="close.emit()"
      aria-label="Fermer l'apercu plein ecran">
      &times;
    </button>

    @if (canNavigate) {
      <button
        type="button"
        class="image-lightbox__nav image-lightbox__nav--previous"
        (click)="previous.emit()"
        aria-label="Image precedente">
        <span aria-hidden="true">&#8249;</span>
      </button>

      <button
        type="button"
        class="image-lightbox__nav image-lightbox__nav--next"
        (click)="next.emit()"
        aria-label="Image suivante">
        <span aria-hidden="true">&#8250;</span>
      </button>
    }

    <div class="image-lightbox__frame">
      <app-responsive-picture
        [sources]="sources"
        [fallbackSrc]="fallbackSrc"
        [alt]="alt"
        loading="eager"
        decoding="async"
        objectFit="contain"
        sizes="100vw">
      </app-responsive-picture>
    </div>

    @if (canNavigate) {
      <div class="image-lightbox__index" aria-live="polite">
        {{ currentIndex + 1 }} / {{ total }}
      </div>
    }
  </div>
</div>
