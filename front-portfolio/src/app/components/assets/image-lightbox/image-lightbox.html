<div class="image-lightbox" (click)="close.emit()">
  <div
    class="image-lightbox__dialog"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="ts.translate('common.lightbox.aria')"
    (click)="$event.stopPropagation()">
    <button
      type="button"
      class="image-lightbox__close"
      (click)="close.emit()"
      [attr.aria-label]="ts.translate('common.lightbox.close')">
      &times;
    </button>

    @if (canNavigate) {
      <button
        type="button"
        class="image-lightbox__nav image-lightbox__nav--previous"
        (click)="previous.emit()"
        [attr.aria-label]="ts.translate('common.lightbox.previous')">
        <span aria-hidden="true">&#8249;</span>
      </button>

      <button
        type="button"
        class="image-lightbox__nav image-lightbox__nav--next"
        (click)="next.emit()"
        [attr.aria-label]="ts.translate('common.lightbox.next')">
        <span aria-hidden="true">&#8250;</span>
      </button>
    }

    <div class="image-lightbox__frame">
      <app-responsive-picture
        [sources]="sources"
        [fallbackSrc]="fallbackSrc"
        [alt]="alt"
        loading="eager"
        decoding="async"
        objectFit="contain"
        sizes="100vw">
      </app-responsive-picture>
    </div>

    @if (canNavigate) {
      <div class="image-lightbox__index" aria-live="polite">
        {{ currentIndex + 1 }} / {{ total }}
      </div>
    }
  </div>
</div>
