<div class="sound-panel">
  <button
    type="button"
    [class.is-playing]="audioService.playingCount() > 0 && !audioService.muted()"
    aria-label="Couper ou réactiver le son"
    (click)="toggleSound()">
    @if (audioService.muted()) {
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.15838 13.9306C2.44537 12.7423 2.44537 11.2577 3.15838 10.0694V10.0694C3.37596 9.70674 3.73641 9.45272 4.1511 9.36978L5.84413 9.03117C5.94499 9.011 6.03591 8.95691 6.10176 8.87788L8.17085 6.39498C9.3534 4.97592 9.94468 4.26638 10.4723 4.45742C11 4.64846 11 5.57207 11 7.41928L11 16.5807C11 18.4279 11 19.3515 10.4723 19.5426C9.94468 19.7336 9.3534 19.0241 8.17085 17.605L6.10176 15.1221C6.03591 15.0431 5.94499 14.989 5.84413 14.9688L4.1511 14.6302C3.73641 14.5473 3.37596 14.2933 3.15838 13.9306V13.9306Z" stroke="#BDC1C7" stroke-width="2"/>
        <path d="M15.5355 8.46447C16.4684 9.39732 16.9948 10.6611 17 11.9803C17.0052 13.2996 16.4888 14.5674 15.5633 15.5076" stroke="#BDC1C7" stroke-width="2" stroke-linecap="round"/>
      </svg>
    } @else {
      <svg fill="#BDC1C7" viewBox="0 0 32 32" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;" version="1.1" xml:space="preserve" xmlns="http://www.w3.org/2000/svg">
        <g id="Icon">
          <path d="M22,19.011l-0,-5.988c-0,-1.657 -1.343,-3 -3,-3c-1.743,-0 -4.257,-0 -6,-0c-1.657,-0 -3,1.343 -3,3l0,5.988c0,1.656 1.343,3 3,3c1.743,-0 4.257,-0 6,-0c1.657,-0 3,-1.344 3,-3Zm-2,-5.988l-0,5.988c-0,0.552 -0.448,1 -1,1l-6,-0c-0.552,-0 -1,-0.448 -1,-1c0,-0 0,-5.988 0,-5.988c0,-0.552 0.448,-1 1,-1l6,-0c0.552,-0 1,0.448 1,1Z"/>
          <path d="M16,1.993c-7.727,-0 -14,6.273 -14,14c0,7.726 6.273,14 14,14c7.727,-0 14,-6.274 14,-14c0,-7.727 -6.273,-14 -14,-14Zm0,2c6.623,-0 12,5.377 12,12c0,6.623 -5.377,12 -12,12c-6.623,-0 -12,-5.377 -12,-12c0,-6.623 5.377,-12 12,-12Z"/>
        </g>
      </svg>
    }
  </button>

  <div class="volume-control">
    <input
      class="volume-slider"
      type="range"
      min="0"
      max="100"
      step="1"
      [value]="volumePercent"
      aria-label="Régler le volume"
      (input)="onVolumeInput($event)">
    <span class="volume-value">{{ volumePercent }}%</span>
  </div>
</div>
