<main class="home-page">
  <section
    id="hero"
    class="home-page__section"
    appRevealOnScroll
    [revealDelay]="0">
    <app-home-resume></app-home-resume>
  </section>

  <section
    id="projects"
    class="home-page__section"
    appRevealOnScroll
    [revealDelay]="0.08"
    [revealY]="32">
    <app-home-projects></app-home-projects>
  </section>

  <section
    id="work"
    class="home-page__section"
    appRevealOnScroll
    [revealDelay]="0.16"
    [revealY]="32">
    <app-home-work></app-home-work>
  </section>
</main>
