<section class="home-work" #ctaBlock>
  <div class="home-work__actions">
    <a class="home-work__cta home-work__cta--primary" routerLink="/work" href="/work">
      <span class="home-work__cta-icon">
        <app-responsive-picture
          [sources]="workIcon.sources"
          [fallbackSrc]="workIcon.fallback"
          [alt]="workIcon.alt"
          loading="eager"
          decoding="async">
        </app-responsive-picture>
      </span>

      <span class="home-work__cta-label">
        <span class="home-work__cta-top">Consulter</span>
        <span class="home-work__cta-bottom">Mon parcours</span>
      </span>
    </a>

    <a
      class="home-work__cta home-work__cta--secondary"
      href="https://www.linkedin.com/in/charles-lindecker/"
      target="_blank"
      rel="noreferrer noopener">
      <span class="home-work__cta-icon">
        <app-responsive-picture
          [sources]="linkedinIcon.sources"
          [fallbackSrc]="linkedinIcon.fallback"
          [alt]="linkedinIcon.alt"
          loading="eager"
          decoding="async">
        </app-responsive-picture>
      </span>

      <span class="home-work__cta-label">
        <span class="home-work__cta-top">Professionnel</span>
        <span class="home-work__cta-bottom">Voir LinkedIn</span>
      </span>
    </a>
  </div>

  <div class="home-work__intro">
    <span class="home-work__eyebrow">Parcours</span>

    <h2>Expériences & Engagement</h2>

    <p>
      Découvrez mon parcours, mes missions de formation, mes expériences
      techniques et mon investissement associatif dans une section dédiée.
    </p>

    <div class="home-work__rail" aria-label="Repères">
      @for (icon of railIcons; track icon.fallback) {
        <span class="home-work__rail-item" [attr.title]="icon.alt">
          <app-responsive-picture
            [sources]="icon.sources"
            [fallbackSrc]="icon.fallback"
            [alt]="icon.alt"
            loading="lazy"
            decoding="async">
          </app-responsive-picture>
        </span>
      }
    </div>
  </div>
</section>
