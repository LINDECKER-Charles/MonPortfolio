<header class="hero" #hero>
  <div class="hero__veil"></div>

  <div class="hero__content">
    <div class="hero__identity">
      <div class="hero__icon-frame">
        <div class="hero__icon">
          <app-responsive-picture
            [sources]="luciditySources"
            [fallbackSrc]="lucidityFallback"
            alt="Icone Lucidity"
            loading="eager"
            decoding="async">
          </app-responsive-picture>
        </div>
      </div>

      <div class="hero__titles">
        <span class="hero__eyebrow">Profil</span>
        <h1>Charles LINDECKER</h1>
        <h2>Developpeur / Formateur ASP.NET & Angular & Symfony</h2>
      </div>
    </div>

    <div class="hero__actions">
      <a class="hero__cta" routerLink="/resume" href="/resume">
        <span class="hero__cta-icon-frame">
          <span class="hero__cta-icon">
            <app-responsive-picture
              [sources]="levelSources"
              [fallbackSrc]="levelFallback"
              alt="Icone niveau"
              loading="eager"
              decoding="async">
            </app-responsive-picture>
          </span>
        </span>

        <span class="hero__cta-label">
          <span class="hero__cta-label-top">Consulter</span>
          <span class="hero__cta-label-bottom">Mon resume</span>
        </span>
      </a>

      <a
        class="hero__cta hero__cta--secondary"
        routerLink="/opening-home"
        href="/opening-home"
        aria-label="Jouer l'animation d'ouverture">
        <span class="hero__cta-icon-frame hero__cta-icon-frame--play">
          <span class="hero__cta-icon hero__cta-icon--play" aria-hidden="true"></span>
        </span>

        <span class="hero__cta-label">
          <span class="hero__cta-label-top">Relancer</span>
          <span class="hero__cta-label-bottom">L'animation</span>
        </span>
      </a>
    </div>
  </div>
</header>
