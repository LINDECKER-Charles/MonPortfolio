<header class="works-hero surface-altar surface-altar--ornate surface-textured" #hero>
  <span class="works-hero__eyebrow text-rune">{{ ts.translate('works.header.eyebrow') }}</span>

  <h1 class="text-engraved--hero">{{ ts.translate('works.header.title') }}</h1>

  <p class="works-hero__lead text-tome text-tome--drop-cap">
    {{ ts.translate('works.header.description') }}
  </p>

  <div class="works-hero__actions">
    <a class="cta-tome cta-tome--shadow transition-ritual" routerLink="/projects" href="/projects">
      <span class="cta-tome__label">
        <span class="cta-tome__top">{{ ts.translate('works.header.cta.top') }}</span>
        <span class="cta-tome__bottom">{{ ts.translate('works.header.cta.bottom') }}</span>
      </span>
    </a>
  </div>
</header>
