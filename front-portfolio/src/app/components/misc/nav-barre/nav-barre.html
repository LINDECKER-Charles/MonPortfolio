<nav class="nav-barre" [attr.aria-label]="ts.translate('common.nav.aria')">
  <div class="nav-barre__inner surface-altar">
    <a class="nav-barre__brand" routerLink="/" href="/">
      <span class="nav-barre__brand-logo">
        <app-responsive-picture
          [sources]="logoSources"
          [fallbackSrc]="logoFallback"
          alt="Logo Charles Lindecker"
          loading="eager"
          decoding="async">
        </app-responsive-picture>
      </span>

      <span class="nav-barre__brand-text">
        <span class="nav-barre__brand-name text-tag">Charles Lindecker</span>
        <span class="nav-barre__brand-role text-rune">{{ ts.translate('common.nav.role') }}</span>
      </span>
    </a>

    <div class="nav-barre__links">
      @for (item of navItems(); track item.href) {
        <a
          class="chip transition-ritual"
          [routerLink]="item.href"
          [href]="item.href"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
          <span class="nav-barre__link-icon">
            <app-responsive-picture
              [sources]="item.iconSources"
              [fallbackSrc]="item.iconFallback"
              loading="lazy"
              decoding="async">
            </app-responsive-picture>
          </span>

          <span class="text-tag nav-barre__link-label">{{ item.label }}</span>
        </a>
      }

      <button
        class="nav-barre__lang-btn transition-ritual"
        (click)="ts.openModal()"
        [attr.aria-label]="ts.translate('nav-barre.lang')"
        type="button">
        <span class="nav-barre__lang-btn-flag" aria-hidden="true">{{ currentLang().flag }}</span>
        <span class="nav-barre__lang-btn-label text-tag">{{ ts.translate('nav-barre.lang') }}</span>
        <span class="nav-barre__lang-btn-code">{{ currentLang().code | uppercase }}</span>
      </button>
    </div>
  </div>
</nav>
