<nav class="nav-barre" [attr.aria-label]="'nav.aria' | translate">
  <div class="nav-barre__inner">
    <a class="nav-barre__brand" routerLink="/" href="/">
      <span class="nav-barre__brand-logo">
        <app-responsive-picture
          [sources]="logoSources"
          [fallbackSrc]="logoFallback"
          alt="Logo Charles Lindecker"
          loading="eager"
          decoding="async">
        </app-responsive-picture>
      </span>

      <span class="nav-barre__brand-text">
        <span class="nav-barre__brand-name">Charles Lindecker</span>
        <span class="nav-barre__brand-role">{{ 'brand.role' | translate }}</span>
      </span>
    </a>

    <div class="nav-barre__links">
      @for (item of navItems; track item.href) {
        <a
          class="nav-barre__link"
          [routerLink]="item.href"
          [href]="item.href"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
          <span class="nav-barre__link-icon">
            <app-responsive-picture
              [sources]="item.iconSources"
              [fallbackSrc]="item.iconFallback"
              [alt]="item.iconAlt"
              loading="lazy"
              decoding="async">
            </app-responsive-picture>
          </span>

          <span class="nav-barre__link-label">{{ item.labelKey | translate }}</span>
        </a>
      }

      <button
        class="nav-barre__language-button"
        type="button"
        (click)="openLanguageModal()"
        [attr.aria-label]="'language.button' | translate">
        <span class="nav-barre__language-icon" aria-hidden="true">
          <app-responsive-picture
            [sources]="languageButtonIconSources"
            [fallbackSrc]="languageButtonIconFallback"
            [alt]="'language.button' | translate"
            loading="lazy"
            decoding="async">
          </app-responsive-picture>
        </span>
        <span class="nav-barre__link-label">{{ 'language.button' | translate }}</span>
      </button>
    </div>
  </div>
</nav>

@if (languageModalOpen()) {
  <app-language-modal (closed)="closeLanguageModal()"></app-language-modal>
}
