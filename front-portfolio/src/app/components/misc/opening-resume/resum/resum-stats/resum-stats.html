<div class="row" (mouseenter)="onRowHoverEnter($event)" (mouseleave)="onRowHoverLeave($event)">
  <span class="label">
    <app-responsive-picture
      [sources]="images.stats.strength.sources"
      [fallbackSrc]="images.stats.strength.fallbackSrc"
      alt=""
    />
    {{ 'resume.stats.backend' | translate }}
  </span>
  <span class="value">95</span>
</div>
