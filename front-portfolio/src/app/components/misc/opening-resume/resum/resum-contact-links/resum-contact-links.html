<div class="contact-block">
  <a
    href="https://github.com/LINDECKER-Charles"
    target="_blank"
    rel="noopener noreferrer"
    class="contact-row"
    [appPlaySoundOnClick]="'newLocation'"
    (mouseenter)="onHoverEnter($event)"
    (mouseleave)="onHoverLeave($event)"
    (mousedown)="onPress($event)"
    (mouseup)="onRelease($event)"
    (blur)="onHoverLeave($event)"
  >
    <span class="contact-label">
      <app-responsive-picture
        [sources]="images.stack.github.sources"
        [fallbackSrc]="images.stack.github.fallbackSrc"
        alt=""
      />
      {{ 'resume.contact.github' | translate }}
    </span>
  </a>

  <a
    href="https://www.linkedin.com/in/charles-lindecker/"
    target="_blank"
    rel="noopener noreferrer"
    class="contact-row"
    [appPlaySoundOnClick]="'newLocation'"
    (mouseenter)="onHoverEnter($event)"
    (mouseleave)="onHoverLeave($event)"
    (mousedown)="onPress($event)"
    (mouseup)="onRelease($event)"
    (blur)="onHoverLeave($event)"
  >
    <span class="contact-label">
      <app-responsive-picture
        [sources]="images.stack.linkedin.sources"
        [fallbackSrc]="images.stack.linkedin.fallbackSrc"
        alt=""
      />
      {{ 'resume.contact.linkedin' | translate }}
    </span>
  </a>

  <a
    href="mailto:charles.lindecker@outlook.fr"
    class="contact-row"
    [appPlaySoundOnClick]="'newLocation'"
    (mouseenter)="onHoverEnter($event)"
    (mouseleave)="onHoverLeave($event)"
    (mousedown)="onPress($event)"
    (mouseup)="onRelease($event)"
    (blur)="onHoverLeave($event)"
  >
    <span class="contact-label">
      <app-responsive-picture
        [sources]="images.stack.mail.sources"
        [fallbackSrc]="images.stack.mail.fallbackSrc"
        alt=""
      />
      {{ 'resume.contact.email' | translate }}
    </span>
  </a>
</div>
