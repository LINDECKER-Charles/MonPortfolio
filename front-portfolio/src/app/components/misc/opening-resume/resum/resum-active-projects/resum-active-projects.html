<h3 class="section-title">{{ ts.translate('resum.active_projects.title') }}</h3>

<ul class="project-list">
  <li>
    <a
      href="https://elan-formation.fr/accueil"
      target="_blank"
      rel="noopener noreferrer"
      class="project-item"
      [appPlaySoundOnClick]="'newLocation'"
      (mouseenter)="onProjectHoverEnter($event)"
      (mouseleave)="onProjectHoverLeave($event)"
      (mousedown)="onProjectPress($event)"
      (mouseup)="onProjectRelease($event)"
      (blur)="onProjectHoverLeave($event)"
    >
      <span class="label">
        <app-responsive-picture
          [sources]="images.projects.mainW1.sources"
          [fallbackSrc]="images.projects.mainW1.fallbackSrc"
          alt=""
        />
        {{ ts.translate('resum.active_projects.elan') }}
      </span>
    </a>
  </li>

  <li>
    <a
      href="https://test.omnicard.fr"
      target="_blank"
      rel="noopener noreferrer"

      (mouseup)="onProjectRelease($event)"

    >
      <span class="label">

          [sources]="images.projects.mainW2.sources"
          [fallbackSrc]="images.projects.mainW2.fallbackSrc"
          alt=""
        />
        {{ ts.translate('resum.active_projects.omnicard') }}
      </span>
    </a>
  </li>

  <li>
    <a

  </li>
