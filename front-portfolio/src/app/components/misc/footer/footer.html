<footer class="footer">
  <div class="footer__top">
    <div class="footer__identity">
      <span class="footer__eyebrow">Charles Lindecker</span>
      <p>{{ 'footer.tagline' | translate }}</p>
    </div>

    <nav class="footer__nav" [attr.aria-label]="'footer.nav.aria' | translate">
      <a routerLink="/" href="/">{{ 'nav.home' | translate }}</a>
      <a routerLink="/resume" href="/resume">{{ 'footer.nav.resume' | translate }}</a>
      <a routerLink="/projects" href="/projects">{{ 'nav.projects' | translate }}</a>
      <a routerLink="/work" href="/work">{{ 'nav.works' | translate }}</a>
    </nav>

    <div class="footer__socials" [attr.aria-label]="'footer.social.aria' | translate">
      <a
        class="footer__social"
        href="https://github.com/LINDECKER-Charles"
        target="_blank"
        rel="noreferrer noopener"
        aria-label="GitHub">
        <span class="footer__social-icon">
          <app-responsive-picture
            [sources]="githubIcon.sources"
            [fallbackSrc]="githubIcon.fallback"
            [alt]="githubIcon.alt"
            loading="lazy"
            decoding="async">
          </app-responsive-picture>
        </span>
      </a>

      <a
        class="footer__social"
        href="https://www.linkedin.com/in/charles-lindecker/"
        target="_blank"
        rel="noreferrer noopener"
        aria-label="LinkedIn">
        <span class="footer__social-icon">
          <app-responsive-picture
            [sources]="linkedinIcon.sources"
            [fallbackSrc]="linkedinIcon.fallback"
            [alt]="linkedinIcon.alt"
            loading="lazy"
            decoding="async">
          </app-responsive-picture>
        </span>
      </a>

      <a class="footer__social" href="mailto:charles.lindecker@outlook.fr" aria-label="Email">
        <span class="footer__social-icon">
          <app-responsive-picture
            [sources]="mailIcon.sources"
            [fallbackSrc]="mailIcon.fallback"
            [alt]="mailIcon.alt"
            loading="lazy"
            decoding="async">
          </app-responsive-picture>
        </span>
      </a>
    </div>
  </div>

  <div class="footer__bottom">
    <span>© 2026 Charles Lindecker</span>
    <span class="footer__divider"></span>
    <span>{{ 'footer.madeWith' | translate }}</span>
  </div>
</footer>
