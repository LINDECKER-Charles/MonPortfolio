<footer class="footer">
  <div class="footer__top">
    <div class="footer__identity">
      <span class="footer__eyebrow text-rune">Charles Lindecker</span>
      <p class="text-tome">
        {{ ts.translate('footer.subtitle') }}
      </p>
    </div>

    <nav class="footer__nav" [attr.aria-label]="ts.translate('footer.aria.nav')">
      <a routerLink="/" href="/">{{ ts.translate('footer.nav.home') }}</a>
      <a routerLink="/resume" href="/resume">{{ ts.translate('footer.nav.resume') }}</a>
      <a routerLink="/projects" href="/projects">{{ ts.translate('footer.nav.projects') }}</a>
      <a routerLink="/work" href="/work">{{ ts.translate('footer.nav.work') }}</a>
    </nav>

    <div class="footer__socials" [attr.aria-label]="ts.translate('footer.aria.socials')">
      <a
        class="footer__social transition-ritual"
        href="https://github.com/LINDECKER-Charles"
        target="_blank"
        rel="noreferrer noopener"
        aria-label="GitHub">
        <span class="footer__social-icon">
          <app-responsive-picture
            [sources]="githubIcon.sources"
            [fallbackSrc]="githubIcon.fallback"
            [alt]="githubIcon.alt"
            loading="lazy"
            decoding="async">
          </app-responsive-picture>
        </span>
      </a>

      <a
        class="footer__social transition-ritual"
        href="https://www.linkedin.com/in/charles-lindecker/"
        target="_blank"
        rel="noreferrer noopener"
        aria-label="LinkedIn">
        <span class="footer__social-icon">
          <app-responsive-picture
            [sources]="linkedinIcon.sources"
            [fallbackSrc]="linkedinIcon.fallback"
            [alt]="linkedinIcon.alt"
            loading="lazy"
            decoding="async">
          </app-responsive-picture>
        </span>
      </a>

      <a
        class="footer__social transition-ritual"
        href="mailto:charles.lindecker@outlook.fr"
        aria-label="Email">
        <span class="footer__social-icon">
          <app-responsive-picture
            [sources]="mailIcon.sources"
            [fallbackSrc]="mailIcon.fallback"
            [alt]="mailIcon.alt"
            loading="lazy"
            decoding="async">
          </app-responsive-picture>
        </span>
      </a>
    </div>
  </div>

  <div class="footer__bottom">
    <span>{{ ts.translate('footer.copyright') }}</span>
    <span class="footer__divider"></span>
    <span>{{ ts.translate('footer.made_with') }}</span>
  </div>
</footer>
