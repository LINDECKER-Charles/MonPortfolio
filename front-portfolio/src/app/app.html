<div class="app-root">

  <!-- Skip link — focus-visible uniquement, pour lecteurs d'écran et navigation clavier -->
  <a class="skip-link" href="#main-content">Aller au contenu</a>

  <!-- Background (z-index: --z-bg = -1, derrière tout) -->
  <div class="bg-gradient"></div>
  <div class="bg-moon"></div>
  <div class="bg-mist"></div>
  <div class="bg-glow"></div>
  <div class="bg-noise"></div>
  <app-ember-particles></app-ember-particles>

  <!-- Navigation (z-index: --z-nav via sticky) -->
  @if (showFooter()) {
    <div class="app-layer">
      <app-nav-barre></app-nav-barre>
    </div>
  }

  <!-- Contenu principal -->
  <div class="app-layer" id="main-content" tabindex="-1">
    <router-outlet></router-outlet>
  </div>

  @if (showFooter()) {
    <div class="app-layer">
      <app-footer></app-footer>
    </div>
  }

  <!-- Overlays globaux : tous fixed, z-index défini par l'échelle CSS -->
  <app-loading></app-loading>
  <app-page-transition></app-page-transition>
  <app-scroll-lanterns></app-scroll-lanterns>

  @if (audio.isAnythingPlaying()) {
    <app-stop-all-sound></app-stop-all-sound>
  }

  @if (ts.isLangModalOpen()) {
    <app-lang-modal (close)="ts.closeModal()" />
  }

</div>
